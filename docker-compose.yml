services:
  db:
    image: postgres:16-alpine
    container_name: wishlist-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-wishlistdb}
      POSTGRES_USER: ${DB_USER:-wishlistuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wishlistpwd}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wishlistuser} -d ${DB_NAME:-wishlistdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.17.1
    container_name: wishlist-migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://${DB_USER:-wishlistuser}:${DB_PASSWORD:-wishlistpwd}@db:5432/${DB_NAME:-wishlistdb}?sslmode=${DB_SSLMODE:-disable}",
        "up"
      ]
    restart: "no"

  app:
    build: .
    container_name: wishlist-api
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-wishlistdb}
      DB_USER: ${DB_USER:-wishlistuser}
      DB_PASSWORD: ${DB_PASSWORD:-wishlistpwd}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      JWT_SECRET: ${JWT_SECRET:-change_me}
    restart: unless-stopped

volumes:
  postgres_data: